name: Script Verification

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  run-tests:
    name: Execute Gradle Tests inside Docker
    runs-on: ubuntu-latest

    container:
      image: minimumy/gradle:8.14.4-jdk17-temurin-noble

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Run local Gradle test suite
        run: gradle clean test --no-daemon --no-build-cache --rerun-tasks